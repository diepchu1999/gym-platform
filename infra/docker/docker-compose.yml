# Docker Compose cho môi trường DEV LOCAL của gym-platform.
# Hạ tầng hỗ trợ (vẫn Modular Monolith): PostgreSQL, Keycloak, Redis, MinIO (S3), Prometheus, Grafana, Zipkin.
# Kafka HOÃN LẠI (xem ADR-0007) -> để dạng comment ở cuối.
# KHÔNG dùng file này cho production.
name: gym-platform-local

services:
  # ---------------- PostgreSQL: nguồn sự thật của app ----------------
  postgres:
    image: postgres:16-alpine
    container_name: gym-platform-postgres
    restart: unless-stopped
    environment:
      # 3 biến PHẢI khớp datasource trong application.yaml và .env.example
      POSTGRES_DB: ${POSTGRES_DB:-gym_platform}
      POSTGRES_USER: ${POSTGRES_USER:-gym}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gym_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [gym-platform-net]

  # ---------------- pgAdmin: UI xem DB ----------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: gym-platform-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@gym-platform.com}   # pgAdmin từ chối TLD .local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks: [gym-platform-net]

  # ---------------- Keycloak: Identity Provider (authentication) ----------------
  # Dev mode (start-dev) dùng DB dev-file lưu trong volume. Production phải trỏ Postgres riêng.
  # Map ra cổng 8085 để KHÔNG đụng cổng 8080 của app Spring chạy trên host.
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: gym-platform-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      # Keycloak 26+ dùng KC_BOOTSTRAP_ADMIN_* để tạo admin lần đầu
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8085}:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak/import:/opt/keycloak/data/import:ro
    networks: [gym-platform-net]

  # ---------------- Redis: cache + short locks (QR TTL, nonce, dup-scan, rate limit) ----------------
  redis:
    image: redis:7-alpine
    container_name: gym-platform-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [gym-platform-net]

  # ---------------- MinIO: Object Storage tương thích S3 (tài liệu/ảnh) ----------------
  minio:
    image: minio/minio:latest
    container_name: gym-platform-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"     # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web console
    volumes:
      - minio-data:/data
    networks: [gym-platform-net]

  # One-shot: tạo sẵn các bucket cần dùng rồi thoát
  minio-setup:
    image: minio/mc:latest
    container_name: gym-platform-minio-setup
    depends_on: [minio]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do echo 'waiting for minio...'; sleep 2; done;
      /usr/bin/mc mb -p local/kyc local/contracts local/invoices local/media;
      echo 'minio buckets ready';
      "
    networks: [gym-platform-net]

  # ---------------- Prometheus: thu thập metrics ----------------
  prometheus:
    image: prom/prometheus:latest
    container_name: gym-platform-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"   # để scrape app Spring chạy trên host
    networks: [gym-platform-net]

  # ---------------- Grafana: dashboard ----------------
  grafana:
    image: grafana/grafana:latest
    container_name: gym-platform-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro  # auto add datasource Prometheus
    depends_on: [prometheus]
    networks: [gym-platform-net]

  # ---------------- Zipkin: distributed tracing ----------------
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: gym-platform-zipkin
    restart: unless-stopped
    ports:
      - "${ZIPKIN_PORT:-9411}:9411"
    networks: [gym-platform-net]

  # ---------------- Kafka (HOÃN LẠI - ADR-0007). Bật khi cần async backbone. ----------------
  # kafka:
  #   image: bitnami/kafka:3.7      # KRaft mode, không cần ZooKeeper
  #   container_name: gym-platform-kafka
  #   restart: unless-stopped
  #   environment:
  #     KAFKA_CFG_NODE_ID: "0"
  #     KAFKA_CFG_PROCESS_ROLES: "controller,broker"
  #     KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
  #     KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
  #     KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
  #     KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  #   ports:
  #     - "${KAFKA_PORT:-9092}:9092"
  #   volumes:
  #     - kafka-data:/bitnami/kafka
  #   networks: [gym-platform-net]

volumes:
  postgres-data:
  pgadmin-data:
  keycloak-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
  # kafka-data:   # bật cùng service kafka ở trên

networks:
  gym-platform-net:
    driver: bridge
