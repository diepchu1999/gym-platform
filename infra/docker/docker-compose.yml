# Docker Compose cho môi trường DEV LOCAL của gym-platform.
# Mục tiêu: dựng nhanh PostgreSQL (+ pgAdmin để xem DB) cho dev.
# KHÔNG dùng file này cho production.
name: gym-platform-local   # Tên project compose -> tiền tố cho network/volume khi chạy

services:
  postgres:
    image: postgres:16-alpine       # Pin version 16 (khớp với DB sẽ dùng); -alpine cho image nhẹ
    container_name: gym-platform-postgres
    restart: unless-stopped         # Tự khởi động lại trừ khi mình chủ động stop
    environment:
      # Giá trị ${VAR:-default}: lấy từ .env nếu có, không thì dùng default.
      # 3 biến này PHẢI khớp với datasource trong application.yaml và .env.example.
      POSTGRES_DB: ${POSTGRES_DB:-gym_platform}        # Tên database
      POSTGRES_USER: ${POSTGRES_USER:-gym}             # User đăng nhập DB
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gym_dev_password}  # Chỉ là mật khẩu DEV
      PGDATA: /var/lib/postgresql/data/pgdata          # Thư mục data nằm trong subfolder (tránh lỗi quyền trên 1 số volume)
    ports:
      - "${POSTGRES_PORT:-5432}:5432"   # host:container — đổi POSTGRES_PORT nếu 5432 bị chiếm
    volumes:
      - postgres-data:/var/lib/postgresql/data   # Named volume -> data còn lại sau khi container bị xoá
    healthcheck:
      # Báo "healthy" chỉ khi Postgres thật sự nhận kết nối -> để pgAdmin/app chờ đúng lúc.
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
        # $$ = escape để compose KHÔNG nội suy; biến được shell TRONG container đọc lúc chạy.
      interval: 10s    # Kiểm tra mỗi 10s
      timeout: 5s      # Quá 5s không phản hồi coi như fail
      retries: 5       # Fail 5 lần liên tiếp mới đánh dấu unhealthy
    networks:
      - gym-platform-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: gym-platform-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@gym-platform.local}  # Tài khoản đăng nhập pgAdmin (UI)
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}                # Mật khẩu DEV cho pgAdmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"   # Mở pgAdmin tại http://localhost:5050
    volumes:
      - pgadmin-data:/var/lib/pgadmin   # Giữ cấu hình server đã add trong pgAdmin
    depends_on:
      postgres:
        condition: service_healthy   # Chỉ khởi động pgAdmin sau khi Postgres healthy
    networks:
      - gym-platform-net

  # ---- TUỲ CHỌN: bật khi cần Redis (cache/rate-limit/idempotency). Hiện skeleton CHƯA cần. ----
  # redis:
  #   image: redis:7-alpine
  #   container_name: gym-platform-redis
  #   restart: unless-stopped
  #   ports:
  #     - "${REDIS_PORT:-6379}:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - gym-platform-net

volumes:
  postgres-data:   # Dữ liệu Postgres
  pgadmin-data:    # Cấu hình pgAdmin
  # redis-data:    # Bật cùng service redis ở trên

networks:
  gym-platform-net:
    driver: bridge   # Mạng nội bộ để các service gọi nhau qua tên service (vd host "postgres")
