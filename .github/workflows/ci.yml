name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "codex/**"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  api:
    name: API build and tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gym_platform
          POSTGRES_USER: gym
          POSTGRES_PASSWORD: gym_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U gym -d gym_platform"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: gym-platform-api

    env:
      DB_URL: jdbc:postgresql://localhost:5432/gym_platform
      DB_USERNAME: gym
      DB_PASSWORD: gym_dev_password
      KEYCLOAK_ISSUER_URI: http://localhost:8085/realms/gym-platform
      KEYCLOAK_JWK_SET_URI: http://localhost:8085/realms/gym-platform/protocol/openid-connect/certs
      TRACING_SAMPLE: "0.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Verify
        run: ./mvnw -q -B verify