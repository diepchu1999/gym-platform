<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1680" viewBox="0 0 1680 1680" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1680" height="1680" fill="#f8fafc"/>

  <g transform="translate(0,250)">
  <!-- Title -->
  <text x="40" y="50" font-size="30" font-weight="700" fill="#0f172a">GYM Platform — Solution Architecture</text>
  <text x="40" y="80" font-size="15" fill="#475569">Modular Monolith · Keycloak (Auth) · Kafka (Events) · Prometheus/Grafana · Zipkin   —   ref: gym-platform-docs/architecture/solution-architecture.md</text>

  <!-- Clients -->
  <rect x="40" y="150" width="210" height="80" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="145" y="185" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">Admin Web</text>
  <text x="145" y="208" text-anchor="middle" font-size="12" fill="#0369a1">React + TypeScript</text>

  <rect x="40" y="270" width="210" height="80" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="145" y="305" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">Member Web</text>
  <text x="145" y="328" text-anchor="middle" font-size="12" fill="#0369a1">React + TypeScript</text>

  <!-- Keycloak -->
  <rect x="320" y="120" width="250" height="120" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="445" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">Keycloak</text>
  <text x="445" y="185" text-anchor="middle" font-size="12" fill="#b45309">OIDC / OAuth2 Identity Provider</text>
  <text x="445" y="206" text-anchor="middle" font-size="12" fill="#b45309">Login · Tokens · MFA · Sessions</text>
  <text x="445" y="227" text-anchor="middle" font-size="11" fill="#b45309">(authentication only)</text>

  <!-- Monolith container -->
  <rect x="320" y="270" width="820" height="580" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
  <rect x="320" y="270" width="820" height="46" rx="14" fill="#4f46e5"/>
  <text x="340" y="300" font-size="17" font-weight="700" fill="#ffffff">Spring Boot Modular Monolith API</text>
  <text x="1120" y="300" text-anchor="end" font-size="13" fill="#c7d2fe">OAuth2 Resource Server</text>

  <!-- Layer stack -->
  <text x="345" y="338" font-size="13" font-weight="700" fill="#3730a3">Request flow (per module)</text>
  <rect x="345" y="348" width="250" height="44" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="470" y="375" text-anchor="middle" font-size="12.5" fill="#312e81">API / Controller</text>
  <rect x="345" y="402" width="250" height="44" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="470" y="429" text-anchor="middle" font-size="12.5" fill="#312e81">Application / Use Case (TX)</text>
  <rect x="345" y="456" width="250" height="44" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="470" y="483" text-anchor="middle" font-size="12.5" fill="#312e81">Domain (entities · policies)</text>
  <rect x="345" y="510" width="250" height="44" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="470" y="537" text-anchor="middle" font-size="12.5" fill="#312e81">Port (repository interface)</text>
  <rect x="345" y="564" width="250" height="44" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="470" y="591" text-anchor="middle" font-size="12.5" fill="#312e81">Infrastructure · Native SQL</text>
  <line x1="335" y1="350" x2="335" y2="606" stroke="#a5b4fc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Module grid -->
  <text x="620" y="338" font-size="13" font-weight="700" fill="#3730a3">Domain modules (com.gym.*)</text>
  <!-- row 1 -->
  <rect x="620" y="350" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="677" y="370" text-anchor="middle" font-size="11.5" fill="#334155">identity</text>
  <rect x="745" y="350" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="802" y="370" text-anchor="middle" font-size="11.5" fill="#334155">member</text>
  <rect x="870" y="350" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="927" y="370" text-anchor="middle" font-size="11.5" fill="#334155">kyc</text>
  <rect x="995" y="350" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="1052" y="370" text-anchor="middle" font-size="11.5" fill="#334155">membership</text>
  <!-- row 2 -->
  <rect x="620" y="388" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="677" y="408" text-anchor="middle" font-size="11.5" fill="#334155">contract</text>
  <rect x="745" y="388" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="802" y="408" text-anchor="middle" font-size="11.5" fill="#334155">payment</text>
  <rect x="870" y="388" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="927" y="408" text-anchor="middle" font-size="11.5" fill="#334155">finance</text>
  <rect x="995" y="388" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="1052" y="408" text-anchor="middle" font-size="11.5" fill="#334155">checkin</text>
  <!-- row 3 -->
  <rect x="620" y="426" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="677" y="446" text-anchor="middle" font-size="11.5" fill="#334155">booking</text>
  <rect x="745" y="426" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="802" y="446" text-anchor="middle" font-size="11.5" fill="#334155">groupclass</text>
  <rect x="870" y="426" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="927" y="446" text-anchor="middle" font-size="11.5" fill="#334155">pt</text>
  <rect x="995" y="426" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="1052" y="446" text-anchor="middle" font-size="11.5" fill="#334155">privateroom</text>
  <!-- row 4 -->
  <rect x="620" y="464" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="677" y="484" text-anchor="middle" font-size="11.5" fill="#334155">massage</text>
  <rect x="745" y="464" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="802" y="484" text-anchor="middle" font-size="11.5" fill="#334155">inventory</text>
  <rect x="870" y="464" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="927" y="484" text-anchor="middle" font-size="11.5" fill="#334155">pantry</text>
  <rect x="995" y="464" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="1052" y="484" text-anchor="middle" font-size="11.5" fill="#334155">equipment</text>
  <!-- row 5 -->
  <rect x="620" y="502" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="677" y="522" text-anchor="middle" font-size="11.5" fill="#334155">crm</text>
  <rect x="745" y="502" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="802" y="522" text-anchor="middle" font-size="11.5" fill="#334155">rating</text>
  <rect x="870" y="502" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="927" y="522" text-anchor="middle" font-size="11.5" fill="#334155">promotion</text>
  <rect x="995" y="502" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="1052" y="522" text-anchor="middle" font-size="11.5" fill="#334155">notification</text>
  <!-- row 6 -->
  <rect x="620" y="540" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="677" y="560" text-anchor="middle" font-size="11.5" fill="#334155">report</text>
  <rect x="745" y="540" width="115" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/><text x="802" y="560" text-anchor="middle" font-size="11.5" fill="#334155">audit</text>
  <rect x="870" y="540" width="115" height="30" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2"/><text x="927" y="560" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3730a3">shared</text>

  <!-- Cross-cutting strip -->
  <rect x="345" y="600" width="765" height="56" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="360" y="623" font-size="12.5" font-weight="700" fill="#3730a3">Cross-cutting</text>
  <text x="360" y="644" font-size="12" fill="#4338ca">shared · Transactional Outbox relay · Micrometer + Actuator (/actuator/prometheus) · Tracing (B3 over HTTP and Kafka)</text>
  <text x="360" y="688" font-size="12" font-style="italic" fill="#6366f1">Modules talk via application/query services and domain events — never another module's repository.</text>
  <text x="360" y="712" font-size="12" fill="#4338ca">Persistence: PostgreSQL + Flyway migrations · race-condition protection (constraints, atomic SQL, EXCLUDE, optimistic lock, idempotency).</text>

  <!-- PostgreSQL -->
  <rect x="1180" y="270" width="460" height="150" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="1410" y="305" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">PostgreSQL</text>
  <text x="1410" y="328" text-anchor="middle" font-size="12" fill="#15803d">Source of truth</text>
  <text x="1410" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">business tables  +  outbox_event</text>
  <text x="1410" y="390" text-anchor="middle" font-size="12" fill="#15803d">constraints · atomic SQL · transactions</text>

  <!-- Kafka -->
  <rect x="1180" y="450" width="460" height="110" rx="12" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="1410" y="485" text-anchor="middle" font-size="17" font-weight="700" fill="#6b21a8">Apache Kafka</text>
  <text x="1410" y="510" text-anchor="middle" font-size="12" fill="#7e22ce">event backbone (topics keyed by aggregate)</text>
  <text x="1410" y="534" text-anchor="middle" font-size="11.5" fill="#7e22ce">payment · booking · checkin · member · contract …</text>

  <!-- Consumers -->
  <rect x="1180" y="600" width="460" height="180" rx="12" fill="#faf5ff" stroke="#9333ea" stroke-width="1.8"/>
  <text x="1410" y="632" text-anchor="middle" font-size="15" font-weight="700" fill="#6b21a8">Async consumers</text>
  <text x="1410" y="653" text-anchor="middle" font-size="11.5" fill="#7e22ce">@KafkaListener · idempotent · in-monolith, extractable</text>
  <rect x="1200" y="672" width="200" height="44" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="1.4"/><text x="1300" y="699" text-anchor="middle" font-size="12.5" fill="#6b21a8">Notification</text>
  <rect x="1420" y="672" width="200" height="44" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="1.4"/><text x="1520" y="699" text-anchor="middle" font-size="12.5" fill="#6b21a8">Audit stream</text>
  <rect x="1200" y="724" width="200" height="44" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="1.4"/><text x="1300" y="751" text-anchor="middle" font-size="12.5" fill="#6b21a8">CRM follow-up</text>
  <rect x="1420" y="724" width="200" height="44" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="1.4"/><text x="1520" y="751" text-anchor="middle" font-size="12.5" fill="#6b21a8">Reporting</text>

  <!-- Observability -->
  <rect x="320" y="890" width="1020" height="160" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="340" y="916" font-size="14" font-weight="700" fill="#334155">Observability</text>
  <rect x="360" y="930" width="290" height="100" rx="10" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
  <text x="505" y="968" text-anchor="middle" font-size="16" font-weight="700" fill="#9f1239">Prometheus</text>
  <text x="505" y="992" text-anchor="middle" font-size="12" fill="#be123c">scrape and store metrics</text>
  <rect x="690" y="930" width="290" height="100" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="835" y="968" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">Grafana</text>
  <text x="835" y="992" text-anchor="middle" font-size="12" fill="#c2410c">dashboards and alerts</text>
  <rect x="1020" y="930" width="290" height="100" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
  <text x="1165" y="968" text-anchor="middle" font-size="16" font-weight="700" fill="#155e75">Zipkin</text>
  <text x="1165" y="992" text-anchor="middle" font-size="12" fill="#0e7490">distributed tracing</text>

  <!-- Arrows -->
  <!-- clients to keycloak -->
  <line x1="250" y1="180" x2="316" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="250" y1="300" x2="316" y2="212" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="262" y="142" font-size="11.5" fill="#334155">login (OIDC/PKCE)</text>
  <!-- clients to monolith (bearer) -->
  <line x1="250" y1="250" x2="316" y2="430" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="244" y="408" font-size="11.5" fill="#334155">HTTPS + Bearer JWT</text>
  <!-- monolith to keycloak validate -->
  <line x1="560" y1="270" x2="520" y2="242" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="555" y="262" font-size="11" fill="#334155">validate JWT (JWKS)</text>
  <!-- monolith to postgres -->
  <line x1="1140" y1="345" x2="1178" y2="345" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1159" y="338" text-anchor="middle" font-size="11" fill="#334155">JDBC</text>
  <!-- monolith to kafka -->
  <line x1="1140" y1="505" x2="1178" y2="505" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1159" y="498" text-anchor="middle" font-size="11" fill="#334155">outbox → publish</text>
  <!-- kafka to consumers -->
  <line x1="1410" y1="560" x2="1410" y2="598" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1424" y="585" font-size="11" fill="#334155">consume</text>
  <!-- prometheus scrapes monolith -->
  <line x1="505" y1="928" x2="560" y2="852" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="892" font-size="11" fill="#334155">scrape /actuator/prometheus</text>
  <!-- prometheus to grafana -->
  <line x1="650" y1="980" x2="688" y2="980" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="669" y="972" text-anchor="middle" font-size="10.5" fill="#334155">datasource</text>
  <!-- monolith spans to zipkin -->
  <line x1="1000" y1="852" x2="1110" y2="928" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1020" y="892" font-size="11" fill="#334155">export spans</text>
  </g>
</svg>
